version: "3.9"

networks:
  knowbase-net:
    driver: bridge

volumes:
  postgres-data:
  n8n-data:
  ollama-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: knowbase-postgres
    restart: unless-stopped
    networks:
      - knowbase-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowbase}
      POSTGRES_USER: ${POSTGRES_USER:-knowbase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowbase}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knowbase} -d ${POSTGRES_DB:-knowbase}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  n8n:
    image: n8nio/n8n:latest
    container_name: knowbase-n8n
    restart: unless-stopped
    networks:
      - knowbase-net
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678/
      GENERIC_TIMEZONE: UTC
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    ports:
      - "5678:5678"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: knowbase-backend
    restart: unless-stopped
    networks:
      - knowbase-net
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/admin/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: knowbase-frontend
    restart: unless-stopped
    networks:
      - knowbase-net
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: knowbase-ollama
    restart: unless-stopped
    networks:
      - knowbase-net
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    profiles:
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
