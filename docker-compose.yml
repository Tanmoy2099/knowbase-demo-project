
networks:
  knowbase-net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: knowbase-postgres
    restart: unless-stopped
    networks:
      - knowbase-net
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowbase}
      POSTGRES_USER: ${POSTGRES_USER:-knowbase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowbase}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knowbase} -d ${POSTGRES_DB:-knowbase}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mailpit:
    image: axllent/mailpit:latest
    container_name: knowbase-mailpit
    restart: unless-stopped
    networks:
      - knowbase-net
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — view all captured emails at http://localhost:8025
    environment:
      MP_MAX_MESSAGES: 500
      MP_UI_AUTH_FILE: ""
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v1/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  n8n:
    image: n8nio/n8n:latest
    container_name: knowbase-n8n
    restart: unless-stopped
    networks:
      - knowbase-net
    volumes:
      - ./data/n8n:/home/node/.n8n
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678/
      GENERIC_TIMEZONE: UTC
      N8N_SECURE_COOKIE: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_LICENSE_ACTIVATION_KEY: ${N8N_LICENSE_KEY:-}
      # SMTP via local Mailpit — all emails captured, none sent externally
      N8N_EMAIL_MODE: smtp
      N8N_SMTP_HOST: mailpit
      N8N_SMTP_PORT: 1025
      N8N_SMTP_USER: ""
      N8N_SMTP_PASS: ""
      N8N_SMTP_SENDER: noreply@knowbase.local
      N8N_SMTP_SSL: "false"
    depends_on:
      mailpit:
        condition: service_healthy
    ports:
      - "5678:5678"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: knowbase-backend
    restart: unless-stopped
    networks:
      - knowbase-net
    env_file:
      - .env
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/admin/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: knowbase-frontend
    restart: unless-stopped
    networks:
      - knowbase-net
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: knowbase-ollama
    restart: unless-stopped
    networks:
      - knowbase-net
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"
    profiles:
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
